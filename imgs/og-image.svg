<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#085041"/>
      <stop offset="100%" style="stop-color:#1d9e75"/>
    </linearGradient>
    <linearGradient id="circle1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.02"/>
    </linearGradient>
  </defs>

  <!-- الخلفية -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- دوائر زخرفية -->
  <circle cx="1050" cy="100" r="220" fill="url(#circle1)"/>
  <circle cx="150" cy="530" r="180" fill="url(#circle1)"/>
  <circle cx="1150" cy="580" r="120" fill="white" opacity="0.04"/>

  <!-- خط زخرفي -->
  <rect x="80" y="300" width="4" height="80" rx="2" fill="#fac775" opacity="0.8"/>

  <!-- شعار نصي كبير -->
  <text x="600" y="220" 
    font-family="Tajawal, Arial, sans-serif" 
    font-size="110" 
    font-weight="900"
    fill="white" 
    text-anchor="middle"
    opacity="1">جدولي</text>

  <!-- خط تحت الاسم -->
  <rect x="380" y="240" width="440" height="5" rx="3" fill="#fac775"/>

  <!-- الوصف -->
  <text x="600" y="340" 
    font-family="Tajawal, Arial, sans-serif" 
    font-size="38" 
    font-weight="500"
    fill="white" 
    text-anchor="middle"
    opacity="0.9">طريقك الذكي لتنظيم حضانتك</text>

  <!-- الوصف الصغير -->
  <text x="600" y="410" 
    font-family="Tajawal, Arial, sans-serif" 
    font-size="26" 
    font-weight="400"
    fill="white" 
    text-anchor="middle"
    opacity="0.7">ملفات • كورسات • خطط تعليمية جاهزة</text>

  <!-- الرابط -->
  <text x="600" y="560" 
    font-family="Tajawal, Arial, sans-serif" 
    font-size="22" 
    font-weight="400"
    fill="#fac775" 
    text-anchor="middle"
    opacity="0.9">mo7amedxv.github.io/jadwaly</text>

  <!-- زينة نجوم صغيرة -->
  <circle cx="200" cy="180" r="4" fill="#fac775" opacity="0.6"/>
  <circle cx="980" cy="420" r="5" fill="#fac775" opacity="0.5"/>
  <circle cx="100" cy="400" r="3" fill="white" opacity="0.4"/>
  <circle cx="1100" cy="250" r="4" fill="white" opacity="0.3"/>
</svg>
